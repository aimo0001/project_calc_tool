<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <meta charset="UTF-8">
    <title>Projects</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<div class="page">
    <div class="card">
        <div class="top-bar">
            <h1>Projekter</h1>
            <a class="button" href="/projects/create">Opret projekt</a>
        </div>

        <div th:if="${#lists.isEmpty(projects)}" class="empty-state">
            Der er ikke oprettet nogen projekter endnu.
        </div>

        <div th:each="project : ${projects}" class="project-row">
            <div>
                <strong th:text="${project.name}">Projekt</strong>
                <div class="muted" th:if="${project.description != null and !#strings.isEmpty(project.description)}"
                     th:text="${project.description}">Beskrivelse</div>
            </div>

            <a class="button secondary" th:href="@{/projects/{id}(id=${project.projectId})}">Åbn</a>
        </div>
    </div>
</div>
</body>
</html>
