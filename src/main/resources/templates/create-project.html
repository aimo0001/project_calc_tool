<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Project</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<div class="page">
    <div class="card">
        <h1>Opret projekt</h1>

        <form action="/projects/create" method="post" th:object="${project}" class="form-grid">
            <div class="form-group">
                <label for="name">Navn</label>
                <input id="name" type="text" th:field="*{name}" required>
            </div>

            <div class="form-group">
                <label for="description">Beskrivelse</label>
                <input id="description" type="text" th:field="*{description}">
            </div>

            <div class="form-group">
                <label for="startDate">Startdato</label>
                <input id="startDate" type="date" th:field="*{startDate}">
            </div>

            <div class="button-row">
                <button type="submit">Gem</button>
                <a class="button secondary" href="/projects">Tilbage</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
