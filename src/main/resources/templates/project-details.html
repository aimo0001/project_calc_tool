<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project Details</title>
</head>
<body>
<h1 th:text="${project.name}">Project name</h1>

<p>
    <strong>Description:</strong>
    <span th:text="${project.description}">Project description</span>
</p>

<p>
    <strong>Start date:</strong>
    <span th:text="${project.startDate}">2026-04-14</span>
</p>

<p>
    <strong>Total hours:</strong>
    <span th:text="${totalHours}">0</span>
</p>

<p>
    <a th:href="@{/projects/{projectId}/edit(projectId=${project.projectId})}">Edit project</a>
</p>

<form method="post" th:action="@{/projects/{projectId}/delete(projectId=${project.projectId})}">
    <button type="submit">Delete project</button>
</form>

<h2>Tasks</h2>
<ul>
    <li th:each="task : ${tasks}">
        <form method="post" th:action="@{/projects/{projectId}/tasks/{taskId}/update(projectId=${project.projectId}, taskId=${task.taskId})}">
            <label th:for="${'taskName-' + task.taskId}">Task name</label>
            <input th:id="${'taskName-' + task.taskId}" type="text" name="name" th:value="${task.name}" required>
            <button type="submit">Update task</button>
        </form>

        <form method="post" th:action="@{/projects/{projectId}/tasks/{taskId}/delete(projectId=${project.projectId}, taskId=${task.taskId})}">
            <button type="submit">Delete task</button>
        </form>

        <p>Subtasks</p>
        <ul>
            <li th:each="subtask : ${subtasksByTask[task.taskId]}">
                <form method="post" th:action="@{/projects/{projectId}/tasks/{taskId}/subtasks/{subtaskId}/update(projectId=${project.projectId}, taskId=${task.taskId}, subtaskId=${subtask.subtaskId})}">
                    <label th:for="${'subtaskName-' + subtask.subtaskId}">Subtask name</label>
                    <input th:id="${'subtaskName-' + subtask.subtaskId}" type="text" name="name" th:value="${subtask.name}" required>

                    <label th:for="${'subtaskHours-' + subtask.subtaskId}">Hours</label>
                    <input th:id="${'subtaskHours-' + subtask.subtaskId}" type="number" name="hours" min="0" step="0.5" th:value="${subtask.hours}" required>

                    <button type="submit">Update subtask</button>
                </form>

                <form method="post" th:action="@{/projects/{projectId}/tasks/{taskId}/subtasks/{subtaskId}/delete(projectId=${project.projectId}, taskId=${task.taskId}, subtaskId=${subtask.subtaskId})}">
                    <button type="submit">Delete subtask</button>
                </form>
            </li>
        </ul>

        <form method="post" th:action="@{/projects/{projectId}/tasks/{taskId}/subtasks/create(projectId=${project.projectId}, taskId=${task.taskId})}" th:object="${subtask}">
            <div>
                <label th:for="${'subtaskName-' + task.taskId}">Subtask name</label>
                <input th:id="${'subtaskName-' + task.taskId}" type="text" th:field="*{name}" required>
            </div>

            <div>
                <label th:for="${'subtaskHours-' + task.taskId}">Hours</label>
                <input th:id="${'subtaskHours-' + task.taskId}" type="number" min="0" step="0.5" th:field="*{hours}" required>
            </div>

            <button type="submit">Save subtask</button>
        </form>
    </li>
</ul>

<h2>Add Task</h2>
<form method="post" th:action="@{/projects/{projectId}/tasks/create(projectId=${project.projectId})}" th:object="${task}">
    <div>
        <label for="taskName">Task name</label>
        <input id="taskName" type="text" th:field="*{name}" required>
    </div>

    <button type="submit">Save task</button>
</form>

<p><a href="/projects">Back to projects</a></p>
</body>
</html>
