<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Project</title>
</head>
<body>
<h1>Edit Project</h1>

<form method="post" th:action="@{/projects/{projectId}/edit(projectId=${project.projectId})}" th:object="${project}">
    <div>
        <label for="name">Project name</label>
        <input id="name" type="text" th:field="*{name}" required>
    </div>

    <div>
        <label for="description">Description</label>
        <input id="description" type="text" th:field="*{description}">
    </div>

    <div>
        <label for="startDate">Start date</label>
        <input id="startDate" type="date" th:field="*{startDate}">
    </div>

    <button type="submit">Update project</button>
</form>

<p><a th:href="@{/projects/{projectId}(projectId=${project.projectId})}">Back to project details</a></p>
</body>
</html>
